services:
  - type: web
    name: rag-creator-chat-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: local
      - key: PYTHONPATH
        value: backend
      - key: PYTHON_VERSION
        value: 3.12.3
